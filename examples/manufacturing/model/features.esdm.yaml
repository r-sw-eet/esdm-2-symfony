apiVersion: schema.esdm.io/given-when-then/v1
kind: feature
name: request-intake
scope:
  domain: manufacturing
  boundedContext: intake
  aggregate: request
scenarios:
  - name: submit-a-request
    when:
      command: submit-request
      data: { customerName: "Acme Co", customerEmail: "buyer@acme.test", product: "Steel bracket", quantity: 500 }
    then:
      events:
        - event: request-submitted
          data:
            id: "11111111-1111-1111-1111-111111111111"
            customerName: "Acme Co"
            customerEmail: "buyer@acme.test"
            product: "Steel bracket"
            quantity: 500
---
apiVersion: schema.esdm.io/given-when-then/v1
kind: feature
name: quote-lifecycle
scope:
  domain: manufacturing
  boundedContext: quoting
  aggregate: quote
scenarios:
  - name: draft-a-quote
    when:
      command: draft-quote
      data: { requestId: "11111111-1111-1111-1111-111111111111" }
    then:
      events:
        - event: quote-drafted
          data: { id: "22222222-2222-2222-2222-222222222222", requestId: "11111111-1111-1111-1111-111111111111", status: "drafted" }

  - name: price-a-drafted-quote
    given:
      - event: quote-drafted
        data: { id: "22222222-2222-2222-2222-222222222222", requestId: "11111111-1111-1111-1111-111111111111", status: "drafted" }
    when:
      command: price-quote
      data: { id: "22222222-2222-2222-2222-222222222222", amount: 1299.5, currency: "EUR", validUntil: "2026-12-31" }
    then:
      events:
        - event: quote-priced
          data: { id: "22222222-2222-2222-2222-222222222222", amount: 1299.5, currency: "EUR", validUntil: "2026-12-31" }

  - name: send-a-quote
    given:
      - event: quote-drafted
        data: { id: "22222222-2222-2222-2222-222222222222", requestId: "11111111-1111-1111-1111-111111111111", status: "drafted" }
    when:
      command: send-quote
      data: { id: "22222222-2222-2222-2222-222222222222" }
    then:
      events:
        - event: quote-sent
          data: { id: "22222222-2222-2222-2222-222222222222", status: "sent" }

  - name: reject-accepting-an-unsent-quote
    given:
      - event: quote-drafted
        data: { id: "22222222-2222-2222-2222-222222222222", requestId: "11111111-1111-1111-1111-111111111111", status: "drafted" }
    when:
      command: accept-quote
      data: { id: "22222222-2222-2222-2222-222222222222" }
    then:
      rejection: { reason: a quote can only be accepted once it has been sent }
