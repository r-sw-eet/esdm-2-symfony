apiVersion: schema.esdm.io/core/v1
kind: domain
name: commerce
description: 'Generated from a BPMN model (proposal 0003).'
---
apiVersion: schema.esdm.io/core/v1
kind: bounded-context
name: sales
scope:
  domain: commerce
---
apiVersion: schema.esdm.io/core/v1
kind: aggregate
name: order
scope:
  domain: commerce
  boundedContext: sales
identifiedBy:
  source: state
  field: id
state:
  type: object
  properties:
    id:
      type: string
    customer:
      type: string
      default: ''
    total:
      type: number
      default: 0
    paidAmount:
      type: number
      default: 0
  required:
    - id
    - customer
    - total
    - paidAmount
---
apiVersion: schema.esdm.io/core/v1
kind: event
name: order-placed
scope:
  domain: commerce
  boundedContext: sales
  aggregate: order
data:
  type: object
  properties:
    id:
      type: string
    customer:
      type: string
    total:
      type: number
    status:
      type: string
      default: placed
  required:
    - id
    - customer
    - total
    - status
---
apiVersion: schema.esdm.io/core/v1
kind: event
name: order-paid
scope:
  domain: commerce
  boundedContext: sales
  aggregate: order
data:
  type: object
  properties:
    id:
      type: string
    paidAmount:
      type: number
    status:
      type: string
      default: paid
  required:
    - id
    - paidAmount
    - status
---
apiVersion: schema.esdm.io/core/v1
kind: event
name: order-approved
scope:
  domain: commerce
  boundedContext: sales
  aggregate: order
data:
  type: object
  properties:
    id:
      type: string
    status:
      type: string
      default: approved
  required:
    - id
    - status
---
apiVersion: schema.esdm.io/core/v1
kind: event
name: order-cancelled
scope:
  domain: commerce
  boundedContext: sales
  aggregate: order
data:
  type: object
  properties:
    id:
      type: string
    status:
      type: string
      default: cancelled
  required:
    - id
    - status
---
apiVersion: schema.esdm.io/core/v1
kind: command
name: place-order
scope:
  domain: commerce
  boundedContext: sales
  aggregate: order
metadata:
  annotations:
    esdm-extensions.io/lifecycle: create
data:
  type: object
  properties:
    customer:
      type: string
    total:
      type: number
  required:
    - customer
    - total
publishes:
  - order-placed
---
apiVersion: schema.esdm.io/core/v1
kind: command
name: pay-order
scope:
  domain: commerce
  boundedContext: sales
  aggregate: order
metadata:
  annotations:
    esdm-extensions.io/lifecycle: mutate
data:
  type: object
  properties:
    id:
      type: string
    paidAmount:
      type: number
  required:
    - id
    - paidAmount
publishes:
  - order-paid
---
apiVersion: schema.esdm.io/core/v1
kind: command
name: approve-order
scope:
  domain: commerce
  boundedContext: sales
  aggregate: order
metadata:
  annotations:
    esdm-extensions.io/lifecycle: mutate
data:
  type: object
  properties:
    id:
      type: string
  required:
    - id
publishes:
  - order-approved
---
apiVersion: schema.esdm.io/core/v1
kind: command
name: cancel-order
scope:
  domain: commerce
  boundedContext: sales
  aggregate: order
metadata:
  annotations:
    esdm-extensions.io/lifecycle: mutate
data:
  type: object
  properties:
    id:
      type: string
  required:
    - id
publishes:
  - order-cancelled
---
apiVersion: schema.esdm.io/core/v1
kind: read-model
name: orders
scope:
  domain: commerce
  boundedContext: sales
paradigm: tabular
schema:
  type: object
  properties:
    id:
      type: string
    customer:
      type: string
      default: ''
    total:
      type: number
      default: 0
    paidAmount:
      type: number
      default: 0
    status:
      type: string
      default: ''
  required:
    - id
    - customer
    - total
    - paidAmount
    - status
projections:
  -
    boundedContext: sales
    aggregate: order
    event: order-placed
    rule: 'Insert a row.'
  -
    boundedContext: sales
    aggregate: order
    event: order-paid
    rule: 'Update the row and set status to paid.'
  -
    boundedContext: sales
    aggregate: order
    event: order-approved
    rule: 'Update the row and set status to approved.'
  -
    boundedContext: sales
    aggregate: order
    event: order-cancelled
    rule: 'Update the row and set status to cancelled.'
---
apiVersion: schema.esdm.io/core/v1
kind: query
name: list-orders
scope:
  domain: commerce
  boundedContext: sales
readModel: orders
result:
  type: array
  items:
    type: object
---
